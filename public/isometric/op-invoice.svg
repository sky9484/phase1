<svg width="480" height="360" viewBox="0 0 480 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iPlatTop" x1="0" y1="0" x2="0.4" y2="1"><stop offset="0" stop-color="#F7EEDF"/><stop offset="1" stop-color="#E9D7BD"/></linearGradient>
    <linearGradient id="iPlatL" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#DCC9AE"/><stop offset="1" stop-color="#CBB18F"/></linearGradient>
    <linearGradient id="iPlatR" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#CAB492"/><stop offset="1" stop-color="#B79F7B"/></linearGradient>
    <linearGradient id="iPaper" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FFFBF1"/><stop offset="1" stop-color="#F1E6D2"/></linearGradient>
    <linearGradient id="iCardTop" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#9CCBD5"/><stop offset="1" stop-color="#69A7B5"/></linearGradient>
    <linearGradient id="iGold" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F7C673"/><stop offset="1" stop-color="#E08C3C"/></linearGradient>
    <marker id="iArrow" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 Z" fill="#E0902F"/></marker>
  </defs>
  <ellipse cx="236" cy="300" rx="168" ry="32" fill="#0b3a44" opacity="0.13"/>
  <!-- platform -->
  <path d="M240 150 L370 225 L240 300 L110 225 Z" fill="url(#iPlatTop)"/>
  <rect width="150" height="26" transform="matrix(0.866 0.5 0 1 110 225)" fill="url(#iPlatL)"/>
  <rect width="150" height="26" transform="matrix(-0.866 0.5 0 1 370 225)" fill="url(#iPlatR)"/>
  <path d="M240 150 L370 225 L240 300 L110 225 Z" fill="none" stroke="#fff" stroke-opacity="0.35" stroke-width="1.4"/>
  <!-- source invoice sheet (encrypted) -->
  <rect width="88" height="9" transform="matrix(0.866 0.5 0 1 145.8 209)" fill="#D9CCB6"/>
  <rect width="118" height="9" transform="matrix(-0.866 0.5 0 1 324.2 194)" fill="#C9BBA2"/>
